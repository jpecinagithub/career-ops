# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Adapted for Jon Peciña
# Focus: Finance leadership, controllership, accounting, FP&A, international roles

title_filter:
  positive:
    # -- Core finance leadership --
    - "Finance Manager"
    - "Finance Director"
    - "Director of Finance"
    - "CFO"
    - "Chief Financial Officer"
    - "Head of Finance"
    - "Finance Lead"

    # -- Controllership / accounting --
    - "Financial Controller"
    - "Controller"
    - "Group Controller"
    - "Business Controller"
    - "Plant Controller"
    - "Commercial Controller"
    - "GL Accountant"
    - "General Ledger"
    - "Senior Accountant"
    - "Accounting Manager"
    - "Chief Accountant"
    - "Finance & Administration"
    - "Finance and Administration Officer"
    - "Finance Officer"
    - "Administration Manager"

    # -- FP&A / reporting / consolidation --
    - "FP&A"
    - "Financial Planning"
    - "Financial Analyst"
    - "Senior Financial Analyst"
    - "Finance Business Partner"
    - "Reporting Manager"
    - "Consolidation"
    - "Treasury Manager"
    - "Budget Manager"

    # -- International / shared services / compliance --
    - "SSC"
    - "Shared Services"
    - "RTR"
    - "Record to Report"
    - "Audit"
    - "Compliance"
    - "IFRS"
    - "VAT"

    # -- ERP / transformation / process --
    - "ERP"
    - "Finance Transformation"
    - "Process Improvement"
    - "Internal Controls"

  negative:
    - "Junior"
    - "Intern"
    - "Internship"
    - "Graduate"
    - "Trainee"
    - "Assistant"
    - "Clerk"
    - "Accounts Payable"
    - "Accounts Receivable"
    - "Payroll Specialist"
    - "Bookkeeper"
    - "Tax Intern"
    - "SAP Developer"
    - "Oracle Developer"
    - "Software Engineer"
    - "Data Scientist"
    - "ML Engineer"
    - "AI Engineer"
    - "Java"
    - ".NET"
    - "Android"
    - "iOS"
    - "Sales"
    - "Account Executive"
    - "Customer Success"

  seniority_boost:
    - "Senior"
    - "Lead"
    - "Head"
    - "Director"
    - "Regional"
    - "Group"
    - "International"
    - "EMEA"
    - "Global"

search_queries:
  # -- Greenhouse --
  - name: Greenhouse — Finance Manager / Controller
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Finance Manager" OR "Financial Controller" OR "Head of Finance" remote OR hybrid OR EMEA'
    enabled: true

  - name: Greenhouse — Accounting / GL / Reporting
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "GL Accountant" OR "Accounting Manager" OR "Reporting Manager" OR "RTR" IFRS OR VAT'
    enabled: true

  - name: Greenhouse — FP&A / Business Partner
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "FP&A" OR "Finance Business Partner" OR "Senior Financial Analyst" EMEA OR Europe'
    enabled: true

  - name: Greenhouse — Finance & Administration
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Finance and Administration Officer" OR "Finance Officer" OR "Administration Manager" NGO OR international'
    enabled: true

  # -- Ashby --
  - name: Ashby — Finance Leadership
    query: 'site:jobs.ashbyhq.com "Finance Manager" OR "Finance Director" OR "Head of Finance" OR CFO remote OR Europe OR EMEA'
    enabled: true

  - name: Ashby — Controller / Accounting
    query: 'site:jobs.ashbyhq.com "Financial Controller" OR "Accounting Manager" OR "GL Accountant" OR "Chief Accountant" hybrid OR remote'
    enabled: true

  - name: Ashby — FP&A / Finance BP
    query: 'site:jobs.ashbyhq.com "FP&A" OR "Finance Business Partner" OR "Senior Financial Analyst" remote OR EMEA'
    enabled: true

  # -- Lever --
  - name: Lever — Finance Leadership
    query: 'site:jobs.lever.co "Finance Manager" OR "Financial Controller" OR "Head of Finance" OR "Finance Director"'
    enabled: true

  - name: Lever — Accounting / Reporting
    query: 'site:jobs.lever.co "GL Accountant" OR "Accounting Manager" OR "RTR" OR "Reporting Manager" IFRS'
    enabled: true

  # -- Workable / general portals --
  - name: Workable — Finance Roles
    query: 'site:apply.workable.com "Finance Manager" OR "Financial Controller" OR "Accounting Manager" OR "FP&A" Europe OR remote'
    enabled: true

  - name: International NGOs / EU Projects
    query: '"Finance and Administration Officer" OR "EU projects" OR "consortium reporting" OR "grant finance" OR "donor compliance" Belgium OR Brussels'
    enabled: true

  - name: Shared Services / SSC Europe
    query: '"GL Accountant" OR "RTR" OR "Record to Report" OR "Financial Accountant" SSC Romania OR Poland OR Netherlands OR Spain'
    enabled: true

  - name: Finance leadership Spain / Remote
    query: '"Director Financiero" OR "Responsable Financiero" OR "Controller Financiero" OR "Finance Manager" Spain OR remote'
    enabled: true

